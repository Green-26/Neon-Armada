<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ KILL = DIFFICULTY - Neon Armada ⚡</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #03050b 0%, #0a0f1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .game-container {
            padding: 20px;
            border-radius: 32px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 3px cyan, 0 0 0 6px #0ff3;
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 10px;
            background: #010418aa;
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid cyan;
            color: #0ff;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats {
            display: flex;
            gap: 25px;
            font-size: 1.3rem;
        }

        .difficulty-box {
            background: #000000aa;
            padding: 5px 15px;
            border-radius: 20px;
            text-align: center;
        }

        .difficulty-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .difficulty-bar {
            width: 200px;
            height: 8px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .difficulty-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: width 0.3s;
        }

        button {
            background: #111a2e;
            border: 1px solid cyan;
            color: cyan;
            font-family: monospace;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.96);
            background: cyan;
            color: black;
        }

        @media (max-width: 780px) {
            .stats { gap: 12px; font-size: 0.9rem; }
            .difficulty-bar { width: 120px; }
        }
    </style>
</head>
<body>
<div>
    <div class="info-panel">
        <div class="stats">
            <span>💥 <span id="scoreValue">0</span></span>
            <span>🏆 <span id="highScoreValue">0</span></span>
            <span>❤️ <span id="livesValue">3</span></span>
            <span>🔪 <span id="killsValue">0</span></span>
        </div>
        <div class="difficulty-box">
            <div class="difficulty-name" id="difficultyName">🌿 EASY</div>
            <div class="difficulty-bar">
                <div class="difficulty-fill" id="difficultyFill"></div>
            </div>
        </div>
        <div class="controls-hint">
            ←→ / AD | SPACE | P | R
        </div>
        <button id="restartButton">🔄 RESTART</button>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
    </div>
    <div id="mobileControls" style="display: flex; justify-content: center; gap: 20px; margin-top: 16px;">
        <button id="leftBtn" style="font-size: 2rem; padding: 8px 20px;">◀</button>
        <button id="fireBtn" style="font-size: 2rem; padding: 8px 30px; background:#ff3366;">💥</button>
        <button id="rightBtn" style="font-size: 2rem; padding: 8px 20px;">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 600;
    
    // ============ GAME STATE ============
    let playerX = W/2 - 20;
    let lives = 3;
    let score = 0;
    let kills = 0;  // THIS DRIVES DIFFICULTY
    let highScore = localStorage.getItem('highScore') || 0;
    let gameOver = false;
    let paused = false;
    let invincibleFrames = 0;
    
    // ============ BULLETS ============
    let bullets = [];
    let shootCooldown = 0;
    
    // ============ ENEMIES ============
    let enemies = [];
    let spawnCounter = 0;
    
    // ============ PARTICLES ============
    let particles = [];
    
    // ============ CONTROLS ============
    let moveLeft = false, moveRight = false;
    let shoot = false;
    
    // ============ DIFFICULTY (based on KILLS) ============
    function getDifficulty() {
        if (kills < 10) return { name: "🌿 EASY", color: "#0f0", spawnDelay: 45, enemySpeed: 2.0, shootDelay: 14, spawnCount: 1 };
        if (kills < 25) return { name: "⚡ MEDIUM", color: "#ff0", spawnDelay: 35, enemySpeed: 2.8, shootDelay: 12, spawnCount: 1 };
        if (kills < 45) return { name: "🔥 HARD", color: "#f80", spawnDelay: 28, enemySpeed: 3.5, shootDelay: 10, spawnCount: 2 };
        if (kills < 70) return { name: "💀 INSANE", color: "#f00", spawnDelay: 22, enemySpeed: 4.2, shootDelay: 8, spawnCount: 2 };
        return { name: "👹 HELL", color: "#f0f", spawnDelay: 18, enemySpeed: 5.0, shootDelay: 6, spawnCount: 3 };
    }
    
    let currentDiff = getDifficulty();
    
    function updateDifficultyUI() {
        currentDiff = getDifficulty();
        document.getElementById('difficultyName').innerHTML = currentDiff.name;
        let percent = Math.min(100, (kills / 100) * 100);
        document.getElementById('difficultyFill').style.width = percent + "%";
        document.getElementById('killsValue').innerText = kills;
    }
    
    // ============ UI UPDATE ============
    function updateUI() {
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('highScoreValue').innerText = highScore;
        document.getElementById('livesValue').innerText = lives;
        updateDifficultyUI();
    }
    
    // ============ GAME MECHANICS ============
    function spawnEnemy() {
        let diff = getDifficulty();
        let x = Math.random() * (W - 34);
        enemies.push({
            x: x,
            y: -28,
            w: 34,
            h: 28,
            speedY: diff.enemySpeed + Math.random() * 1.5
        });
    }
    
    function addExplosion(x, y) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x + Math.random() * 30,
                y: y + Math.random() * 30,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                life: 20,
                size: 3 + Math.random() * 4
            });
        }
    }
    
    function resetGame() {
        gameOver = false;
        paused = false;
        lives = 3;
        score = 0;
        kills = 0;
        bullets = [];
        enemies = [];
        particles = [];
        invincibleFrames = 0;
        playerX = W/2 - 20;
        updateUI();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('highScore', highScore);
        }
        for (let i = 0; i < 3; i++) spawnEnemy();
    }
    
    function playerHit() {
        if (invincibleFrames > 0 || gameOver) return;
        lives--;
        updateUI();
        if (lives <= 0) {
            gameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
            }
        } else {
            invincibleFrames = 50;
        }
    }
    
    // ============ UPDATE LOGIC ============
    function updateGame() {
        if (gameOver || paused) return;
        
        let diff = getDifficulty();
        
        // Move player
        let speed = 7;
        if (moveLeft) playerX -= speed;
        if (moveRight) playerX += speed;
        playerX = Math.min(Math.max(playerX, 5), W - 45);
        
        // Shoot
        if (shootCooldown > 0) shootCooldown--;
        if (shoot && shootCooldown === 0 && !gameOver) {
            bullets.push({
                x: playerX + 20 - 2.5,
                y: H - 55,
                w: 5,
                h: 12
            });
            shootCooldown = diff.shootDelay;
        }
        
        // Update bullets
        for (let i = 0; i < bullets.length; i++) {
            bullets[i].y -= 8;
            if (bullets[i].y + bullets[i].h < 0 || bullets[i].y > H) {
                bullets.splice(i, 1);
                i--;
            }
        }
        
        // Update enemies
        for (let i = 0; i < enemies.length; i++) {
            enemies[i].y += enemies[i].speedY;
            if (enemies[i].y > H + 100) {
                enemies.splice(i, 1);
                i--;
                continue;
            }
            
            // Enemy collision with player
            if (invincibleFrames === 0 && !gameOver &&
                playerX < enemies[i].x + enemies[i].w &&
                playerX + 40 > enemies[i].x &&
                H - 45 < enemies[i].y + enemies[i].h) {
                playerHit();
                addExplosion(enemies[i].x, enemies[i].y);
                enemies.splice(i, 1);
                i--;
            }
        }
        
        // Bullet collision with enemies
        for (let i = 0; i < bullets.length; i++) {
            for (let j = 0; j < enemies.length; j++) {
                if (bullets[i].x < enemies[j].x + enemies[j].w &&
                    bullets[i].x + bullets[i].w > enemies[j].x &&
                    bullets[i].y < enemies[j].y + enemies[j].h &&
                    bullets[i].y + bullets[i].h > enemies[j].y) {
                    
                    bullets.splice(i, 1);
                    enemies.splice(j, 1);
                    score += 10;
                    kills++;  // KILL INCREASES DIFFICULTY
                    updateUI();
                    addExplosion(enemies[j]?.x || 0, enemies[j]?.y || 0);
                    i--;
                    break;
                }
            }
        }
        
        // Invincibility frames
        if (invincibleFrames > 0) invincibleFrames--;
        
        // Spawn enemies
        if (spawnCounter <= 0) {
            for (let i = 0; i < diff.spawnCount; i++) {
                spawnEnemy();
            }
            spawnCounter = diff.spawnDelay;
        } else {
            spawnCounter--;
        }
        
        // Update particles
        for (let i = 0; i < particles.length; i++) {
            particles[i].x += particles[i].vx;
            particles[i].y += particles[i].vy;
            particles[i].life--;
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
    }
    
    // ============ DRAW EVERYTHING ============
    function drawStars() {
        for (let i = 0; i < 150; i++) {
            let x = (i * 131) % W;
            let y = (i * 253 + Date.now() * 0.1) % H;
            ctx.fillStyle = `rgba(255,255,200,${0.3 + Math.sin(Date.now() * 0.003 + i) * 0.2})`;
            ctx.fillRect(x, y, 2, 2);
        }
    }
    
    function drawPlayer() {
        if (invincibleFrames > 0 && Math.floor(Date.now() / 50) % 2 === 0) return;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#0ff";
        ctx.fillStyle = "#3eff9e";
        ctx.beginPath();
        ctx.roundRect(playerX, H - 42, 40, 28, 8);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.moveTo(playerX + 20, H - 52);
        ctx.lineTo(playerX + 14, H - 42);
        ctx.lineTo(playerX + 26, H - 42);
        ctx.fill();
        ctx.fillStyle = "#ff44aa";
        ctx.fillRect(playerX + 5, H - 36, 8, 12);
        ctx.fillRect(playerX + 27, H - 36, 8, 12);
        ctx.shadowBlur = 0;
    }
    
    function drawEnemies() {
        let diff = getDifficulty();
        for (let e of enemies) {
            ctx.shadowBlur = 6;
            ctx.fillStyle = diff.color;
            ctx.beginPath();
            ctx.roundRect(e.x, e.y, e.w, e.h, 10);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 20px monospace";
            ctx.fillText("👾", e.x + 7, e.y + 22);
            ctx.shadowBlur = 0;
        }
    }
    
    function drawBullets() {
        for (let b of bullets) {
            ctx.fillStyle = "#ffff40";
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }
    }
    
    function drawParticles() {
        for (let p of particles) {
            ctx.fillStyle = `rgba(255, 80, 40, ${p.life / 20})`;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
    }
    
    function drawUI() {
        if (paused && !gameOver) {
            ctx.font = "40px monospace";
            ctx.fillStyle = "#0ff";
            ctx.fillText("PAUSED", W/2 - 80, H/2);
        }
        if (gameOver) {
            ctx.font = "42px monospace";
            ctx.fillStyle = "#f33";
            ctx.fillText("GAME OVER", W/2 - 130, H/2 - 40);
            ctx.font = "20px monospace";
            ctx.fillStyle = "#0ff";
            ctx.fillText("Press R to restart", W/2 - 100, H/2 + 30);
        }
    }
    
    // Helper
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    }
    
    function draw() {
        ctx.fillStyle = "#010514";
        ctx.fillRect(0, 0, W, H);
        drawStars();
        drawEnemies();
        drawBullets();
        drawParticles();
        drawPlayer();
        drawUI();
    }
    
    // ============ GAME LOOP ============
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // ============ CONTROLS ============
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { shoot = true; e.preventDefault(); }
        if (e.code === 'KeyP') { paused = !paused; e.preventDefault(); }
        if (e.code === 'KeyR') { resetGame(); e.preventDefault(); }
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = true;
    });
    
    document.addEventListener('keyup', (e) => {
        if (e.code === 'Space') shoot = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = false;
    });
    
    // Mobile
    document.getElementById('leftBtn').onmousedown = () => moveLeft = true;
    document.getElementById('leftBtn').onmouseup = () => moveLeft = false;
    document.getElementById('rightBtn').onmousedown = () => moveRight = true;
    document.getElementById('rightBtn').onmouseup = () => moveRight = false;
    document.getElementById('fireBtn').onmousedown = () => shoot = true;
    document.getElementById('fireBtn').onmouseup = () => shoot = false;
    
    document.getElementById('leftBtn').ontouchstart = (e) => { e.preventDefault(); moveLeft = true; };
    document.getElementById('leftBtn').ontouchend = () => moveLeft = false;
    document.getElementById('rightBtn').ontouchstart = (e) => { e.preventDefault(); moveRight = true; };
    document.getElementById('rightBtn').ontouchend = () => moveRight = false;
    document.getElementById('fireBtn').ontouchstart = (e) => { e.preventDefault(); shoot = true; };
    document.getElementById('fireBtn').ontouchend = () => shoot = false;
    
    document.getElementById('restartButton').onclick = () => resetGame();
    
    // Initialize
    updateUI();
    for (let i = 0; i < 3; i++) spawnEnemy();
    gameLoop();
</script>
</body>
</html>
